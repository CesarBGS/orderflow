version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=OrderFlowDb;User Id=sa;Password=OrderFlow@123;TrustServerCertificate=True
      - Jwt__Key=orderflow-secret-key-super-segura-2024-xpto
      - Jwt__Issuer=OrderFlow
      - Jwt__Audience=OrderFlowUsers
    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=OrderFlow@123
    ports:
      - "1433:1433"